# /etc/nginx/sites-available/monocle

server {
    listen 80;
    server_name api.monocle.3lvn4g.xyz;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name api.monocle.3lvn4g.xyz;

    ssl_certificate     /etc/letsencrypt/live/api.monocle.3lvn4g.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.monocle.3lvn4g.xyz/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location / {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # SSE streaming (chat endpoint)
        proxy_buffering    off;
        proxy_read_timeout 300s;
    }
}
