<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#09090b"/>

  <!-- Dot grid -->
  <defs>
    <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="rgba(255,255,255,0.04)"/>
    </pattern>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3f3f46" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#09090b" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <ellipse cx="600" cy="315" rx="500" ry="300" fill="url(#glow)"/>

  <!-- Logo mark -->
  <g transform="translate(80, 72)">
    <circle cx="26" cy="28" r="18" stroke="white" stroke-width="3" fill="none"/>
    <circle cx="31" cy="28" r="4" fill="white"/>
    <line x1="42" y1="40" x2="54" y2="54" stroke="white" stroke-width="3" stroke-linecap="round"/>
    <text x="70" y="42" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="700" fill="white" letter-spacing="-1">Monocle</text>
  </g>

  <!-- Headline -->
  <text x="80" y="240" font-family="Inter, system-ui, sans-serif" font-size="72" font-weight="800" fill="white" letter-spacing="-2">AI Agents That Own</text>
  <text x="80" y="330" font-family="Inter, system-ui, sans-serif" font-size="72" font-weight="800" fill="#71717a" letter-spacing="-2">Their Identity.</text>

  <!-- Subtitle -->
  <text x="80" y="415" font-family="Inter, system-ui, sans-serif" font-size="28" fill="#71717a">Programmable identity, payments, and orchestration on Solana.</text>

  <!-- Pills -->
  <g transform="translate(80, 460)">
    <rect width="130" height="40" rx="8" fill="#18181b" stroke="#3f3f46"/>
    <text x="65" y="25" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#a1a1aa" text-anchor="middle">.sol Identity</text>
  </g>
  <g transform="translate(224, 460)">
    <rect width="150" height="40" rx="8" fill="#18181b" stroke="#3f3f46"/>
    <text x="75" y="25" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#a1a1aa" text-anchor="middle">dWallet Custody</text>
  </g>
  <g transform="translate(388, 460)">
    <rect width="150" height="40" rx="8" fill="#18181b" stroke="#3f3f46"/>
    <text x="75" y="25" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#a1a1aa" text-anchor="middle">x402 Payments</text>
  </g>
  <g transform="translate(552, 460)">
    <rect width="190" height="40" rx="8" fill="#18181b" stroke="#3f3f46"/>
    <text x="95" y="25" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#a1a1aa" text-anchor="middle">Agent Orchestration</text>
  </g>

</svg>
